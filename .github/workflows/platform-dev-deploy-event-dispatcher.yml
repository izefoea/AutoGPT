name: PoC - Logic Flaw State Machine Poisoning

on:
  pull_request:
    types: [closed]
  issue_comment:
    types: [created]

permissions:
  issues: read
  pull-requests: read

jobs:
  poc-logic-test:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Comment Event - Permission Check
        if: github.event_name == 'issue_comment' && github.event.issue.pull_request
        uses: actions/github-script@v7
        with:
          script: |
            const commentBody = context.payload.comment.body.trim();
            const authorAssociation = context.payload.comment.author_association;
            const user = context.payload.comment.user.login;
            
            const hasPermission = ['OWNER', 'MEMBER', 'COLLABORATOR'].includes(authorAssociation);
            
            console.log(`💬 User: ${user} | Role: ${authorAssociation} | Comment: ${commentBody}`);
            
            if (!hasPermission) {
               console.log(`❌ Permission DENIED for ${user}. Action blocked.`);
               return;
            }
            
            if (commentBody === '!deploy') {
               console.log(`✅ Permission GRANTED for ${user}. [Simulating Deployment...]`);
            } else if (commentBody === '!undeploy') {
               console.log(`✅ Permission GRANTED for ${user}. [Simulating Undeployment...]`);
            }

      - name: 2. PR Close Event - The Vulnerable Status Check
        id: check_pr_close
        if: github.event_name == 'pull_request' && github.event.action == 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            console.log(`🔍 Scanning historical comments for PR #${context.issue.number}...`);
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            let lastDeployIndex = -1;
            let lastUndeployIndex = -1;
            
            comments.data.forEach((comment, index) => {
              console.log(`   [Log] Found comment by ${comment.user.login}: ${comment.body}`);
              if (comment.body.trim() === '!deploy') {
                lastDeployIndex = index;
              } else if (comment.body.trim() === '!undeploy') {
                lastUndeployIndex = index;
              }
            });
            
            const shouldUndeploy = lastDeployIndex !== -1 && lastDeployIndex > lastUndeployIndex;
            console.log(`\n📊 State Machine Result:`);
            console.log(`   Last !deploy index: ${lastDeployIndex}`);
            console.log(`   Last !undeploy index: ${lastUndeployIndex}`);
            console.log(`   => should_undeploy flag set to: ${shouldUndeploy}`);
            
            core.setOutput('should_undeploy', shouldUndeploy);

      - name: 3. Final Action - Auto-Undeploy Decision
        if: github.event_name == 'pull_request' && github.event.action == 'closed'
        run: |
          if [ "${{ steps.check_pr_close.outputs.should_undeploy }}" == "true" ]; then
            echo "🧹 SUCCESS: Performing cleanup of orphaned resources..."
          else
            echo "🚨 BUG TRIGGERED: should_undeploy is false! Cleanup skipped. Resources are now orphaned."
          fi
